name: Revalidate Dealer Prices

on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: arcteryx-production-refresh-writes
  cancel-in-progress: false

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

jobs:
  revalidate-dealer-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m playwright install --with-deps chromium
          python -m camoufox fetch

      - name: Verify required secrets
        run: |
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_KEY"

      - name: Revalidate known dealer URLs
        run: |
          python -u -m dealers.revalidate
          python tools/check_data_quality.py --online --dealer mec --dealer evo --dealer rei --dealer ssense --max-age-hours 36 --min-rows 50
