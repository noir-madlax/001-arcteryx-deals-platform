name: Revalidate Dealer Prices

on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:
    inputs:
      repair_only:
        description: "Only repair derived dealer discount fields and run quality checks"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: arcteryx-production-refresh-writes
  cancel-in-progress: false

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

jobs:
  revalidate-dealer-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m playwright install --with-deps chromium
          python -m camoufox fetch

      - name: Verify required secrets
        run: |
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_KEY"

      - name: Repair derived dealer discounts
        run: |
          python tools/repair_dealer_discounts.py --dealer mec --dealer evo --dealer rei --dealer ssense

      - name: Revalidate known dealer URLs
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.repair_only != true }}
        run: python -u -m dealers.revalidate

      - name: Verify dealer data quality
        run: |
          python tools/check_data_quality.py --online --dealer mec --dealer evo --dealer rei --dealer ssense --max-age-hours 36 --max-product-age-hours 72 --min-rows 50
