name: Refresh Outlet Data

on:
  schedule:
    - cron: "17 2,14 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: arcteryx-production-refresh-writes
  cancel-in-progress: false

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
  SITE_URL: https://001.100app.dev

jobs:
  refresh-outlet:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Verify required secrets
        run: |
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_KEY"

      - name: Refresh Outlet scrape and sync
        run: |
          git pull --ff-only origin main
          date -u '+%Y-%m-%d %H:%M:%S' > .last_run_start
          python -u global_scraper.py
          python -u sku_scraper.py --reset --update-data
          python -u supabase_sync.py
          python tools/check_data_quality.py --online --dealer arcteryx_outlet --max-age-hours 36 --min-rows 100

      - name: Optional notifications
        run: |
          python check_price_alerts.py || echo "price alerts check failed"
          python notify_telegram.py || echo "telegram notification failed"

      - name: Commit refreshed static data
        run: |
          git config user.email "bot@arcteryx-deals.local"
          git config user.name "ArcBot"
          git add .last_sync .sku_progress.json data.js h5/data.js
          if git diff --cached --quiet; then
            echo "No Outlet data changes to commit"
            exit 0
          fi
          git commit -m "data: auto outlet refresh $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push origin main

      - name: Verify production freshness
        run: |
          python tools/check_data_quality.py --online --dealer arcteryx_outlet --max-age-hours 36 --min-rows 100
          curl -fsS https://001.100app.dev/data.js | python -c 'import sys; s=sys.stdin.read(); assert "sku_id" in s; print("data.js bytes", len(s), "sku_entries", s.count("\"sku_id\""))'
