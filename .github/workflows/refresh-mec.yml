name: Refresh MEC Data

on:
  schedule:
    # OCI MEC starts at :00 on these hours. Check 20 minutes later.
    - cron: "20 1,4,7,10,13,16,19,22 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Run even when the OCI primary is healthy"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: arcteryx-production-refresh-writes
  cancel-in-progress: false

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
  GITHUB_TOKEN: ${{ github.token }}

jobs:
  lease-gate:
    runs-on: ubuntu-latest
    outputs:
      acquired: ${{ steps.lease.outputs.acquired }}
      owner: ${{ steps.lease.outputs.owner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install 'requests>=2.32,<3'
      - id: lease
        name: Claim MEC fallback lease when needed
        env:
          FORCE_RUN: ${{ inputs.force || 'false' }}
        run: |
          owner="github-actions-mec-${GITHUB_RUN_ID}"
          should_run="$FORCE_RUN"
          if [ "$should_run" != "true" ]; then
            should_run=$(python tools/crawler_lease.py needs-fallback --scope mec --stale-hours 3.1)
          fi
          acquired=false
          if [ "$should_run" = "true" ]; then
            acquired=$(python tools/crawler_lease.py acquire --scope mec --owner "$owner" --ttl-minutes 90)
          fi
          echo "owner=$owner" >> "$GITHUB_OUTPUT"
          echo "acquired=$acquired" >> "$GITHUB_OUTPUT"

  refresh-mec:
    needs: lease-gate
    if: needs.lease-gate.outputs.acquired == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Verify required secrets
        run: |
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_KEY"

      - name: Verify MEC fallback browser runtime
        run: python tools/check_mec_browser_runtime.py

      - name: Refresh MEC scrape and sync
        run: |
          git pull --ff-only origin main
          mkdir -p dealers/_partial
          rm -f dealers/_partial/*.json
          timeout 1800 python -u -m dealers.mec
          python tools/check_mec_partial.py
          python -m dealers.merge_partial
          python -u -m dealers.supabase_sync
          python tools/check_data_quality.py --online --dealer mec --max-age-hours 36 --max-product-age-hours 72 --min-rows 50

      - name: Commit refreshed MEC static data
        run: |
          git config user.email "bot@arcteryx-deals.local"
          git config user.name "ArcBot"
          git add dealers/results.json
          if git diff --cached --quiet; then
            echo "No MEC data changes to commit"
            exit 0
          fi
          git commit -m "data(mec): GitHub fallback refresh $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push origin main

      - name: Verify production freshness
        run: python tools/check_data_quality.py --online --dealer mec --max-age-hours 36 --max-product-age-hours 72 --min-rows 50

      - name: Release MEC lease
        if: always()
        env:
          LEASE_OWNER: ${{ needs.lease-gate.outputs.owner }}
          JOB_STATUS: ${{ job.status }}
        run: |
          python -m pip install 'requests>=2.32,<3' >/dev/null
          status=failed
          [ "$JOB_STATUS" = "success" ] && status=success
          python tools/crawler_lease.py finish --scope mec --owner "$LEASE_OWNER" --status "$status" --message "GitHub Actions run ${GITHUB_RUN_ID}: $JOB_STATUS"
