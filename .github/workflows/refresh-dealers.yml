name: Refresh Dealer Data

on:
  schedule:
    - cron: "50 1,4,7,10,13,16,19,22 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Run even when the primary node is healthy"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: arcteryx-production-refresh-writes
  cancel-in-progress: false

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
  SITE_URL: https://001.100app.dev

jobs:
  lease-gate:
    runs-on: ubuntu-latest
    outputs:
      acquired: ${{ steps.lease.outputs.acquired }}
      owner: ${{ steps.lease.outputs.owner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install 'requests>=2.32,<3'
      - id: lease
        name: Claim Dealers fallback lease when needed
        env:
          FORCE_RUN: ${{ inputs.force || 'false' }}
        run: |
          owner="github-actions-dealers-${GITHUB_RUN_ID}"
          should_run="$FORCE_RUN"
          if [ "$should_run" != "true" ]; then
            should_run=$(python tools/crawler_lease.py needs-fallback --scope dealers --stale-hours 4.5)
          fi
          acquired=false
          if [ "$should_run" = "true" ]; then
            acquired=$(python tools/crawler_lease.py acquire --scope dealers --owner "$owner" --ttl-minutes 180)
          fi
          echo "owner=$owner" >> "$GITHUB_OUTPUT"
          echo "acquired=$acquired" >> "$GITHUB_OUTPUT"

  refresh-dealers:
    needs: lease-gate
    if: needs.lease-gate.outputs.acquired == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m playwright install --with-deps chromium
          python -m camoufox fetch

      - name: Verify required secrets
        run: |
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_KEY"

      - name: Refresh dealer scrape and sync
        run: |
          git pull --ff-only origin main
          mkdir -p dealers/_partial
          rm -f dealers/_partial/*.json
          failed_dealers=""
          for dealer in mec evo rei ssense; do
            echo "[dealers] $dealer"
            if ! timeout 1800 python -u -m "dealers.$dealer"; then
              echo "[dealers] $dealer FAILED"
              failed_dealers="$failed_dealers $dealer"
            fi
          done
          # 发布成功抓到的 dealer。merge_partial 用上一轮 results.json 播种，失败的
          # dealer 保留上次数据；supabase_sync 对缺失 dealer 直接跳过（14 天 stale
          # buffer 兜底，不删存量行）。不再因单个 dealer 失败就整体拒绝发布。
          python -m dealers.merge_partial
          python -u -m dealers.supabase_sync
          if [ -n "$failed_dealers" ]; then
            echo "::warning::dealer scrape failed for:$failed_dealers — 已发布其余 dealer；下面的每 dealer 新鲜度门决定 build 状态"
          fi
          # 真正的守门员：每个 dealer 必须存在且最新数据 <=36h（REI 失败 >36h 才让 build 红）。
          python tools/check_data_quality.py --online --dealer mec --dealer evo --dealer rei --dealer ssense --max-age-hours 36 --min-rows 50

      - name: Optional price alerts
        run: python check_price_alerts.py || echo "price alerts check failed"

      - name: Commit refreshed dealer static data
        run: |
          git config user.email "bot@arcteryx-deals.local"
          git config user.name "ArcBot"
          git add dealers/results.json
          if git diff --cached --quiet; then
            echo "No dealer data changes to commit"
            exit 0
          fi
          git commit -m "data(dealers): auto refresh $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push origin main

      - name: Verify production freshness
        run: |
          python tools/check_data_quality.py --online --dealer mec --dealer evo --dealer rei --dealer ssense --max-age-hours 36 --min-rows 50
          curl -fsS https://001.100app.dev/dealers/results.json | python -c 'import json,sys; data=json.load(sys.stdin); print("generated_at", data.get("generated_at")); print({k:v.get("count") for k,v in data.get("dealers",{}).items()})'

      - name: Release Dealers lease
        if: always()
        env:
          LEASE_OWNER: ${{ needs.lease-gate.outputs.owner }}
          JOB_STATUS: ${{ job.status }}
        run: |
          status=failed
          [ "$JOB_STATUS" = "success" ] && status=success
          python tools/crawler_lease.py finish --scope dealers --owner "$LEASE_OWNER" --status "$status" --message "GitHub Actions run ${GITHUB_RUN_ID}: $JOB_STATUS"
