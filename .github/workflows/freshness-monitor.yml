name: Production Freshness Monitor

on:
  schedule:
    - cron: "25 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: arcteryx-production-freshness-monitor
  cancel-in-progress: true

jobs:
  freshness-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install monitor dependency
        run: python -m pip install 'requests>=2.32,<3'

      - name: Check production Supabase freshness
        run: |
          python tools/check_data_quality.py --online --dealer arcteryx_outlet --max-age-hours 36 --max-product-age-hours 72 --min-rows 100 --forbid-region jp
          python tools/check_data_quality.py --online --dealer mec --dealer evo --dealer rei --dealer ssense --max-age-hours 36 --max-product-age-hours 72 --min-rows 50

      - name: Check production static fallbacks
        run: |
          curl -fsS https://001.100app.dev/ >/dev/null
          curl -fsS https://001.100app.dev/data.js | python -c 'import sys; s=sys.stdin.read(); assert "sku_id" in s; print("data.js bytes", len(s), "sku_entries", s.count("\"sku_id\""))'
          curl -fsS https://001.100app.dev/dealers/results.json | python -c 'import json,sys; data=json.load(sys.stdin); assert data.get("dealers"); print("dealers generated_at", data.get("generated_at")); print("dealer refreshed_at", {k:v.get("refreshed_at") for k,v in data["dealers"].items()})'
