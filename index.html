            --surface: #ffffff;
            --border: #e8e4dc;
            --border-strong: #d4cfc4;

            --text-2: #5e5e5e;

            --shadow-sm: 0 1px 2px rgba(28,25,22,0.05);
            --shadow-md: 0 8px 28px rgba(28,25,22,0.08);
            --r-sm: 6px;
            --r-md: 10px;
            --r-lg: 16px;

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;

            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        a { color: inherit; text-decoration: none; }
        button, select, input { font: inherit; color: inherit; }

        img { display: block; max-width: 100%; }

        /* ─── Header ─── */

            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(250, 250, 248, 0.88);
            backdrop-filter: saturate(180%) blur(14px);
            -webkit-backdrop-filter: saturate(180%) blur(14px);
            border-bottom: 1px solid var(--border);
        }
        .header-inner {
            max-width: 1440px;
            margin: 0 auto;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        .brand {
            display: flex;
            align-items: baseline;
            gap: 10px;
            min-width: 0;
        }
        .brand-mark {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.02em;
        }
        .brand-sub {
            font-size: 11px;
            color: var(--text-3);
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .header-stats {
            display: flex;
            gap: 18px;
            font-size: 12px;
            color: var(--text-2);
            flex-shrink: 0;
        }
        .header-stats span strong {
            color: var(--text);
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }
        @media (max-width: 640px) {
            .header-inner { padding: 12px 16px; }

            .header-stats { gap: 12px; font-size: 11px; }
            .header-stats .hide-sm { display: none; }
        }

        /* ─── Filter strip (single scrollable chip row) ─── */
        .filter-strip {
            max-width: 1440px;
            margin: 0 auto;
            padding: 0 24px 10px;
            display: flex;
            align-items: center;
            gap: 5px;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .filter-strip::-webkit-scrollbar { display: none; }
        .filter-strip .chip-group {
            overflow-x: visible;
            flex: 0 0 auto;
        }
        .filter-pipe {
            width: 1px;
            height: 18px;
            background: var(--border-strong);
            flex-shrink: 0;
            margin: 0 4px;
        }
        /* Inline result count in filter-top */
        .filter-count {
            margin-left: auto;
            font-size: 11.5px;
            color: var(--text-2);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 5px;
            flex-shrink: 0;
        }
        .filter-count strong {
            color: var(--text);
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }
        .filter-count .reset-link {
            color: var(--text-3);
            font-size: 11px;
            padding: 2px 6px;
            border: 1px solid var(--border);
            border-radius: 999px;

        .grid-wrap {
            max-width: 1440px;
            margin: 0 auto;
            padding: 12px 24px 64px;

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 28px 20px;

        @media (max-width: 720px)  { .grid { grid-template-columns: repeat(2, 1fr); gap: 20px 12px; } }
        @media (max-width: 640px)  { .grid-wrap { padding: 8px 16px 48px; } }

        /* ─── Card ─── */
        .card {
            background: transparent;
            border-radius: var(--r-md);
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: transform 0.2s ease;

            background: #f0ece4;
            border-radius: var(--r-md);
            overflow: hidden;
            transition: background 0.2s;

        .card-img {

            height: 100%;

        .card-img-fallback {

            z-index: 0;

            justify-content: center;

            margin-top: 2px;

        .card-sale {
            font-size: 14.5px;
            font-weight: 700;
            color: var(--accent);
            font-variant-numeric: tabular-nums;
        }
        .card-orig {
            font-size: 12px;
            color: var(--text-3);
            text-decoration: line-through;
            font-variant-numeric: tabular-nums;
        }
        .card-cny {
            font-size: 11.5px;
            color: var(--text-2);
            font-variant-numeric: tabular-nums;
            margin-top: 2px;
        }
        .card-color {
            font-size: 11px;
            color: var(--text-3);
            margin-top: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .card-color::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--border-strong);
            flex-shrink: 0;
        }
        /* size chips on card */
        .card-sizes {
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
            margin-top: 5px;
        }
        .card-sz {
            font-size: 10px;
            padding: 1px 5px;
            border: 1px solid var(--border);
            border-radius: 3px;
            color: var(--text-2);
            font-variant-numeric: tabular-nums;
            line-height: 1.6;
            background: var(--surface);
        }
        .card-sz.more {
            color: var(--text-3);
            border-color: transparent;
            background: none;
        }

        /* ─── Empty state ─── */
        .empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: var(--text-2);
        }
        .empty h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
        .empty p { font-size: 13px; }

        /* ─── Footer ─── */
        .site-footer {
            border-top: 1px solid var(--border);
            padding: 32px 24px;
            text-align: center;
            color: var(--text-3);
            font-size: 12px;
            line-height: 1.7;
        }
        .site-footer a { color: var(--text-2); border-bottom: 1px solid var(--border-strong); }

        /* ─── Loading ─── */
        .loading {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: inherit;
            gap: inherit;
        }
        .skel {
            aspect-ratio: 4 / 5;
            background: linear-gradient(90deg, #f0ece4 0%, #e8e2d4 50%, #f0ece4 100%);
            background-size: 200% 100%;
            border-radius: var(--r-md);
            animation: shine 1.4s ease-in-out infinite;
        }
        @keyframes shine {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>

<script>

const SYMBOL_TO_CCY = {
    '$': 'USD', '€': 'EUR', '£': 'GBP', 'C$': 'CAD',

const REGION_LABEL = {
    us:'美国', ca:'加拿大', gb:'英国', de:'德国', fr:'法国', nl:'荷兰',
    au:'澳大利亚', se:'瑞典', at:'奥地利', ch:'瑞士', jp:'日本', it:'意大利', es:'西班牙', dk:'丹麦', be:'比利时',

const GENDER_LABEL = { men: '男装', women: '女装', unknown: '其他' };

const toCNY = (price, symbol, currency) => {
    const ccy = currency || SYMBOL_TO_CCY[symbol] || 'USD';
    return Math.round(price * (RATES[ccy] || 7.25));
};

const fmt = (n) => n.toLocaleString('en-US');

// ── Clean product name (drop trailing description blob) ──
const GENDER_MARKERS = ["Women's", "Men's", "Unisex", 'Damen', 'Herren', 'Femme', 'Homme'];
const cleanName = (raw) => {
    if (!raw) return '';
    let s = raw.trim();
    // Strip garbage prefixes ("Der ", "system_a", "Veste à capuche", ...)
    s = s.replace(NAME_PREFIX_STRIP, '');
    // Some entries have brand line "veilance" glued: "veilanceSpere..." → "Veilance Spere..."
    s = s.replace(/^veilance([A-Z])/, 'Veilance $1');
    // 1) split on gender marker (English + German + French)
    for (const m of GENDER_MARKERS) {
        const i = s.indexOf(m);
        if (i > 0) return s.slice(0, i + m.length).trim();
    }
    // 2) fallback: find last lowercase→uppercase transition with a 12+ char tail
    const m = s.match(/^(.+?[a-z])([A-Z].{12,})$/);
    return m ? m[1].trim() : s;
};

// ── State (URL-synced) ──
// Known Arc'teryx series (first word of cleaned name)
const KNOWN_SERIES = new Set([

    'Veilance', 'Macai', 'Cronin', 'Serratus', 'Satoro',
    'Mantis', 'Arro', 'Brize', 'Khard', 'Granville', 'Index',

// German/French prefix garbage to strip from product names
const NAME_PREFIX_STRIP = /^(?:Der|Die|Das|Veste à capuche|Veste|system_a)\s*/i;

const extractSeries = (cleanedName) => {
    if (!cleanedName) return '其他';
    const first = cleanedName.split(/[\s\-]/)[0];
    return KNOWN_SERIES.has(first) ? first : '其他';
};

const state = {
    q: '',
    region: 'all',

    category: 'all',
    series: 'all',

};

const readURL = () => {

    for (const k of Object.keys(state)) {

    }
};
const writeURL = () => {
    const p = new URLSearchParams();
    for (const [k, v] of Object.entries(state)) {
        if (v && v !== 'all' && !(k === 'sort' && v === 'discount_desc') && v !== '') p.set(k, v);
    }
    const qs = p.toString();
    history.replaceState(null, '', qs ? '?' + qs : location.pathname);
};

// ── Normalize ISO timestamp → "YYYY-MM-DD HH:MM:SS" ──
const normTs = (ts) => {
    if (!ts) return '';
    return ts.replace('T', ' ').slice(0, 19);
};

// ── Filtering & rendering ──
let products = [];

const filterProducts = () => {
    const q = state.q.trim().toLowerCase();
    return products.filter(p => {
        if (state.region !== 'all' && p.region !== state.region) return false;
        if (state.gender !== 'all' && p.gender !== state.gender) return false;
        if (state.category !== 'all' && p.category !== state.category) return false;
        if (state.series !== 'all' && p._series !== state.series) return false;
        if (q) {
            const hay = ((p.full_name || '') + ' ' + (p.description || '') + ' ' + (p.category || '')).toLowerCase();
            if (!hay.includes(q)) return false;
        }
        return true;
    });
};

const sortProducts = (arr) => {
    const sorted = arr.slice();
    switch (state.sort) {
        case 'price_asc': sorted.sort((a, b) => toCNY(a.sale_price, a.symbol) - toCNY(b.sale_price, b.symbol)); break;
        case 'price_desc': sorted.sort((a, b) => toCNY(b.sale_price, b.symbol) - toCNY(a.sale_price, a.symbol)); break;
        case 'recent': sorted.sort((a, b) => (b.last_updated || '').localeCompare(a.last_updated || '')); break;
        case 'discount_desc':
        default: sorted.sort((a, b) => (b.discount_pct || 0) - (a.discount_pct || 0));
    }
    return sorted;
};

const buildCard = (p) => {
    const name = cleanName(p.full_name || p.model);
    const cny = toCNY(p.sale_price, p.symbol, p.currency);
    const encodedUrl = encodeURIComponent(p.url || '');
    const flag = REGION_FLAG[p.region] || '';
    const skuParam = p.sku_id ? `&sku=${encodeURIComponent(p.sku_id)}` : '';
    const href = `product-detail.html?url=${encodedUrl}${skuParam}`;
    // Color label — clean up "Name/Name" duplicates
    const colorRaw = p.color || '';
    const colorDisplay = (() => {
        if (!colorRaw) return '';
        const parts = colorRaw.split('/');
        if (parts.length === 2 && parts[0].trim() === parts[1].trim()) return parts[0].trim();
        return colorRaw;
    })();
    // In-stock sizes — show first 6, then "+N"
    const inStock = p.sizes
        ? p.sizes.filter(sz => (p.size_stock?.[sz] || 'in_stock') !== 'out_of_stock')
        : [];
    const shown = inStock.slice(0, 6);
    const extra = inStock.length - shown.length;
    const sizeHtml = shown.length
        ? `<div class="card-sizes">${shown.map(sz => `<span class="card-sz">${sz}</span>`).join('')}${extra > 0 ? `<span class="card-sz more">+${extra}</span>` : ''}</div>`
        : '';
    return `
    <a class="card" href="${href}">
        <div class="card-img-wrap">
            <div class="card-img-fallback">${name}</div>
            ${p.image_url ? `<img class="card-img" src="${p.image_url}" alt="${name.replace(/"/g, '&quot;')}" loading="lazy" onerror="this.style.display='none'">` : ''}
            <span class="card-flag">${flag} ${REGION_LABEL[p.region] || p.region}</span>
            ${p.discount_pct ? `<span class="card-disc">−${p.discount_pct}%</span>` : ''}
        </div>
        <div class="card-body">
            <div class="card-cat">${p.category || '其他'}</div>
            <div class="card-name">${name}</div>
            ${colorDisplay ? `<div class="card-color">${colorDisplay}</div>` : ''}
            <div class="card-prices">
                <span class="card-sale">${p.symbol}${fmt(p.sale_price)}</span>
                ${p.original_price ? `<span class="card-orig">${p.symbol}${fmt(p.original_price)}</span>` : ''}
            </div>
            <div class="card-cny">≈ ¥${fmt(cny)}</div>
            ${sizeHtml}
        </div>
    </a>`;
};

const buildChips = (containerId, options, key) => {
    const el = document.getElementById(containerId);
    el.innerHTML = options.map(opt =>
        `<button class="chip ${state[key] === opt.value ? 'active' : ''}" data-value="${opt.value}">${opt.label}${opt.count != null ? `<span class="count">${opt.count}</span>` : ''}</button>`
    ).join('');
    el.querySelectorAll('.chip').forEach(btn => {
        btn.addEventListener('click', () => {
            state[key] = btn.dataset.value;
            writeURL();
            render();
        });
    });
};

const computeStats = () => {
    const total = products.length;
    const maxDisc = Math.max(...products.map(p => p.discount_pct || 0));
    const lastUpdated = products.map(p => p.last_updated).filter(Boolean).sort().pop() || '';
    const fmtUpdated = (() => {
        if (!lastUpdated) return '—';
        const [datePart, timePart] = lastUpdated.split(' ');
        const mmdd = datePart?.slice(5) || '';
        const hh   = timePart?.slice(0, 2) || '';
        return hh ? `${mmdd} ${hh}:00` : mmdd;
    })();
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-max-disc').textContent = '−' + maxDisc + '%';
    document.getElementById('stat-updated').textContent = fmtUpdated;
};

const countBy = (key) => {
    const m = {};
    for (const p of products) m[p[key]] = (m[p[key]] || 0) + 1;
    return m;
};

const initChips = () => {
    const regionCounts = countBy('region');
    const regionOrder = ['us', 'ca', 'gb', 'de', 'fr', 'nl'];
    const presentRegions = Object.keys(regionCounts).sort((a, b) => {
        const ai = regionOrder.indexOf(a), bi = regionOrder.indexOf(b);
        return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
    });
    const regions = [
        { value: 'all', label: '全部地区', count: products.length },
        ...presentRegions.map(r => ({
            value: r,
            label: `${REGION_FLAG[r] || '🌐'} ${REGION_LABEL[r] || r.toUpperCase()}`,
            count: regionCounts[r],
        })),
    ];
    buildChips('region-chips', regions, 'region');

    const genderCounts = countBy('gender');
    const genders = [
        { value: 'all', label: '不限性别' },
        ...['women', 'men', 'unknown']
            .filter(g => genderCounts[g])
            .map(g => ({ value: g, label: GENDER_LABEL[g], count: genderCounts[g] })),
    ];
    buildChips('gender-chips', genders, 'gender');

    const catCounts = countBy('category');
    const cats = [
        { value: 'all', label: '全部品类' },
        ...Object.entries(catCounts)
            .sort((a, b) => b[1] - a[1])
            .map(([c, n]) => ({ value: c, label: c, count: n })),
    ];
    buildChips('category-chips', cats, 'category');

    const seriesCounts = countBy('_series');
    // Show "其他" last, rest sorted by count desc
    const seriesEntries = Object.entries(seriesCounts)
        .sort((a, b) => {
            if (a[0] === '其他') return 1;
            if (b[0] === '其他') return -1;
            return b[1] - a[1];
        });
    const series = [
        { value: 'all', label: '全部系列' },
        ...seriesEntries.map(([s, n]) => ({ value: s, label: s, count: n })),
    ];
    buildChips('series-chips', series, 'series');
};

const render = () => {
    const filtered = sortProducts(filterProducts());
    const grid = document.getElementById('grid');
    if (!filtered.length) {
        grid.innerHTML = `<div class="empty"><h3>没有符合条件的商品</h3><p>试试调整筛选或清除条件</p></div>`;
    } else {
        grid.innerHTML = filtered.map(buildCard).join('');
    }
    document.getElementById('result-count').textContent = filtered.length;
    const avg = filtered.length ? Math.round(filtered.reduce((s, p) => s + (p.discount_pct || 0), 0) / filtered.length) : 0;
    document.getElementById('result-avg').textContent = '−' + avg + '%';
    // Refresh active state on chips
    document.querySelectorAll('.chip').forEach(b => {
        const parent = b.parentElement.id;
        const key = parent === 'region-chips' ? 'region'
            : parent === 'gender-chips' ? 'gender'
            : parent === 'series-chips' ? 'series'
            : 'category';
        b.classList.toggle('active', state[key] === b.dataset.value);
    });
};

const initSearch = () => {
    const wrap = document.getElementById('search-wrap');
    const input = document.getElementById('q');
    const clear = document.getElementById('q-clear');
    input.value = state.q;
    wrap.classList.toggle('has-value', !!state.q);
    let t;
    input.addEventListener('input', () => {
        clearTimeout(t);
        t = setTimeout(() => {
            state.q = input.value;
            wrap.classList.toggle('has-value', !!state.q);
            writeURL();
            render();
        }, 180);
    });
    clear.addEventListener('click', () => {
        input.value = '';
        state.q = '';
        wrap.classList.remove('has-value');
        writeURL();
        render();
        input.focus();
    });
};

const initSort = () => {
    const sel = document.getElementById('sort');
    sel.value = state.sort;
    sel.addEventListener('change', () => {
        state.sort = sel.value;
        writeURL();
        render();
    });
};

const initReset = () => {
    document.getElementById('reset-link').addEventListener('click', (e) => {
        e.preventDefault();
        Object.assign(state, { q: '', region: 'all', gender: 'all', category: 'all', series: 'all', sort: 'discount_desc' });
        document.getElementById('q').value = '';
        document.getElementById('search-wrap').classList.remove('has-value');
        document.getElementById('sort').value = 'discount_desc';
        writeURL();
        render();
    });
};

// ── Bootstrap ────────────────────────────────────────────────────────────────
async function init() {
    readURL();
    initSearch();
    initSort();
    initReset();

    // Show loading skeleton
    document.getElementById('grid').innerHTML =
        `<div class="empty"><p style="color:var(--text-3);font-size:14px">加载数据中…</p></div>`;

    try {
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
        const { data, error } = await db.from('products').select('*').limit(2000);
        if (error) throw error;
        products = (data || []).map(p => ({
            ...p,
            last_updated: normTs(p.last_updated),
            sizes:      Array.isArray(p.sizes)      ? p.sizes      : (p.sizes      ? JSON.parse(p.sizes)      : []),
            size_stock: typeof p.size_stock === 'object' ? p.size_stock : (p.size_stock ? JSON.parse(p.size_stock) : {}),
            _series:    extractSeries(cleanName(p.full_name || p.model)),
        }));
    } catch (e) {
        console.warn('Supabase load failed, falling back to data.js:', e);
        // Graceful fallback: load data.js dynamically
        await new Promise((res, rej) => {
            const s = document.createElement('script');
            s.src = 'data.js';
            s.onload = res;
            s.onerror = rej;
            document.head.appendChild(s);
        }).catch(() => {});
        products = (typeof PRODUCTS !== 'undefined' ? PRODUCTS : [])
            .map(p => ({ ...p, _series: extractSeries(cleanName(p.full_name || p.model)) }));
    }

    computeStats();
    initChips();
    render();
}

init();
</script>
