<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#fafaf8">
    <title>商品详情 · Arc'teryx Outlet</title>
    <link rel="preconnect" href="https://images-dynamic-arcteryx.imgix.net" crossorigin>
    <link rel="preconnect" href="https://images.arcteryx.com" crossorigin>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        :root {
            --bg: #fafaf8;
            --surface: #ffffff;
            --border: #e8e4dc;
            --border-strong: #d4cfc4;
            --text: #1a1a1a;
            --text-2: #5e5e5e;
            --text-3: #9a948a;
            --accent: #c8362a;
            --accent-soft: #f7e8e6;
            --accent-strong: #a72b21;
            --hover: #f3efe8;
            --in-stock: #1f7a3d;
            --warn: #b8860b;
            --shadow-sm: 0 1px 2px rgba(28,25,22,0.05);
            --shadow-md: 0 8px 28px rgba(28,25,22,0.08);
            --r-sm: 6px;
            --r-md: 10px;
            --r-lg: 16px;
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { overflow-x: hidden; max-width: 100vw; }
        html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            line-height: 1.55;
            font-feature-settings: 'tnum' 1, 'kern' 1;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            padding-bottom: env(safe-area-inset-bottom);
        }
        main { width: 100%; max-width: 100%; }
        img, svg, video { max-width: 100%; height: auto; }
        a { color: inherit; text-decoration: none; }
        button { font: inherit; cursor: pointer; background: none; border: none; color: inherit; }
        img { display: block; max-width: 100%; }

        /* ─── Header (consistent w/ index) ─── */
        .site-header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(250, 250, 248, 0.88);
            backdrop-filter: saturate(180%) blur(14px);
            -webkit-backdrop-filter: saturate(180%) blur(14px);
            border-bottom: 1px solid var(--border);
        }
        .header-inner {
            max-width: 1440px;
            margin: 0 auto;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        .brand { display: flex; align-items: baseline; gap: 10px; }
        .brand-mark { font-size: 16px; font-weight: 700; letter-spacing: 0.02em; }
        .brand-sub { font-size: 11px; color: var(--text-3); font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap; }
        .back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-2);
            transition: color 0.15s;
        }
        .back:hover { color: var(--text); }
        @media (max-width: 640px) {
            .header-inner { padding: 12px 16px; }
            .brand-sub { display: none; }
        }

        /* ─── Layout ─── */
        .product {
            max-width: 1280px;
            margin: 0 auto;
            padding: 32px 24px 48px;
            display: grid;
            grid-template-columns: minmax(0, 1.1fr) minmax(0, 1fr);
            gap: 56px;
        }
        @media (max-width: 960px) {
            .product { grid-template-columns: 1fr; gap: 28px; padding: 20px 16px 96px; }
        }

        /* ─── Gallery ─── */
        .gallery { position: relative; }
        @media (min-width: 961px) {
            .gallery {
                position: sticky;
                top: 80px;
                align-self: start;
            }
        }
        .main-img-wrap {
            aspect-ratio: 4 / 5;
            background: #f0ece4;
            border-radius: var(--r-lg);
            overflow: hidden;
            position: relative;
        }
        .main-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: zoom-in;
        }
        .gallery-disc {
            position: absolute;
            top: 16px;
            right: 16px;
            background: var(--accent);
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            padding: 5px 10px;
            border-radius: var(--r-sm);
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.02em;
        }
        .thumbs {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            padding-bottom: 4px;
        }
        .thumbs::-webkit-scrollbar { display: none; }
        .thumb {
            flex-shrink: 0;
            width: 76px;
            height: 76px;
            border-radius: var(--r-sm);
            overflow: hidden;
            background: #f0ece4;
            border: 1.5px solid transparent;
            transition: border-color 0.15s, transform 0.15s;
            cursor: pointer;
            padding: 0;
        }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }
        .thumb:hover { transform: translateY(-1px); }
        .thumb.active { border-color: var(--text); }

        /* ─── Info column ─── */
        .info { display: flex; flex-direction: column; gap: 22px; }
        .crumb {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .crumb .dot { width: 3px; height: 3px; background: var(--text-3); border-radius: 50%; }
        .title-block h1 {
            font-size: clamp(22px, 3.2vw, 30px);
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: -0.01em;
            margin-bottom: 8px;
        }
        .desc { color: var(--text-2); font-size: 14px; line-height: 1.65; }

        /* Price */
        .price-block {
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 14px;
            padding: 16px 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }
        .price-sale {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.01em;
        }
        .price-orig {
            font-size: 15px;
            color: var(--text-3);
            text-decoration: line-through;
            font-variant-numeric: tabular-nums;
        }
        .price-cny {
            font-size: 14px;
            color: var(--text-2);
            font-variant-numeric: tabular-nums;
        }
        .save {
            font-size: 12px;
            color: var(--accent);
            background: var(--accent-soft);
            padding: 3px 8px;
            border-radius: var(--r-sm);
            font-weight: 600;
        }

        /* Section */
        .section h3 {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 10px;
        }
        .section h3 .val { color: var(--text); margin-left: 6px; text-transform: none; letter-spacing: 0; font-weight: 500; font-size: 13px; }

        .opts {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .opt {
            min-height: 38px;
            padding: 0 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            font-size: 13px;
            color: var(--text);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.15s;
        }
        .opt:hover { border-color: var(--text); }
        .opt.active { border-color: var(--text); background: var(--text); color: var(--surface); }
        .opt.out {
            opacity: 0.45;
            cursor: not-allowed;
            text-decoration: line-through;
        }
        .opt.out:hover { border-color: var(--border); }
        .opt.size {
            min-width: 50px;
            padding: 0 10px;
            font-variant-numeric: tabular-nums;
        }
        .stock-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--in-stock);
        }
        .opt.out .stock-dot { background: var(--text-3); }

        /* CTA */
        .cta {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            height: 52px;
            padding: 0 28px;
            background: var(--text);
            color: var(--surface);
            border-radius: var(--r-md);
            font-size: 15px;
            font-weight: 600;
            transition: background 0.15s, transform 0.15s;
            letter-spacing: 0.01em;
        }
        .cta:hover { background: var(--accent); }
        .cta:active { transform: translateY(1px); }

        /* Meta */
        .meta {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 18px 24px;
            padding-top: 22px;
            border-top: 1px solid var(--border);
        }
        .meta-item { display: flex; flex-direction: column; gap: 3px; }
        .meta-label { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em; }
        .meta-val { font-size: 13px; color: var(--text); font-weight: 500; word-break: break-word; }

        /* Sticky bottom CTA on mobile */
        .sticky-cta {
            display: none;
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 60;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid var(--border);
            padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
            align-items: center;
            gap: 12px;
        }
        .sticky-cta .price-stack { display: flex; flex-direction: column; line-height: 1.2; }
        .sticky-cta .price-sale { font-size: 18px; }
        .sticky-cta .price-cny { font-size: 11px; color: var(--text-2); }
        .sticky-cta .cta { flex: 1; height: 46px; font-size: 14px; }
        @media (max-width: 960px) {
            .sticky-cta { display: flex; }
            .info .cta-inline { display: none; }
        }

        /* States */
        .state {
            max-width: 1280px;
            margin: 0 auto;
            padding: 80px 24px;
            text-align: center;
            color: var(--text-2);
        }
        .state h2 { color: var(--text); font-size: 20px; font-weight: 600; margin-bottom: 8px; }
        .state .cta { margin-top: 18px; }

        .skel { background: linear-gradient(90deg, #f0ece4 0%, #e8e2d4 50%, #f0ece4 100%); background-size: 200% 100%; border-radius: var(--r-md); animation: shine 1.4s ease-in-out infinite; }
        @keyframes shine { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Lightbox */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(20,18,15,0.92);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
            cursor: zoom-out;
        }
        .lightbox.open { display: flex; }
        .lightbox img { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* ─── 降价提醒 按钮 + Modal ─── */
        .alert-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-2);
            font-size: 13px;
            padding: 7px 12px;
            border-radius: 999px;
            margin-top: 10px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .alert-btn:hover { border-color: var(--text); color: var(--text); background: var(--hover); }
        .alert-btn svg { color: var(--accent); }

        .pa-overlay {
            position: fixed; inset: 0; z-index: 100;
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
            opacity: 0; pointer-events: none;
            transition: opacity 0.2s;
        }
        .pa-overlay.show { opacity: 1; pointer-events: auto; }
        .pa-card {
            background: var(--surface);
            border-radius: var(--r-lg);
            box-shadow: var(--shadow-md);
            max-width: 420px; width: 100%;
            padding: 22px 22px 18px;
            position: relative;
            transform: translateY(8px);
            transition: transform 0.2s;
        }
        .pa-overlay.show .pa-card { transform: translateY(0); }
        .pa-close {
            position: absolute; top: 12px; right: 12px;
            width: 26px; height: 26px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-2); font-size: 17px;
            background: none; border: none; cursor: pointer;
        }
        .pa-close:hover { background: var(--hover); color: var(--text); }
        .pa-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
        .pa-sub { font-size: 12px; color: var(--text-3); margin-bottom: 14px; line-height: 1.5; }
        .pa-sub strong { color: var(--accent); font-weight: 600; }
        .pa-field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
        .pa-field label { font-size: 12px; color: var(--text-2); }
        .pa-field input {
            height: 38px; padding: 0 12px;
            background: #fafaf8;
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            font-size: 13.5px;
            outline: none;
            transition: border-color 0.15s;
        }
        .pa-field input:focus { border-color: var(--text); background: var(--surface); }
        .pa-hint { font-size: 11px; color: var(--text-3); margin-top: 3px; }
        .pa-submit {
            width: 100%; height: 40px;
            background: var(--text); color: var(--surface);
            border: none; border-radius: var(--r-sm);
            font-size: 14px; font-weight: 500;
            cursor: pointer; transition: background 0.15s;
            margin-top: 4px;
        }
        .pa-submit:hover { background: #000; }
        .pa-submit:disabled { opacity: 0.5; cursor: not-allowed; }
        .pa-msg { font-size: 12.5px; padding: 8px 10px; border-radius: var(--r-sm); margin-top: 8px; display: none; }
        .pa-msg.ok { display: block; background: #e6f4ec; color: #1f7a3d; }
        .pa-msg.err { display: block; background: #fbeae7; color: var(--accent-strong); }

        /* ─── 历史价格图 ───────────────────────────────────────────── */
        .ph-card {
            margin-top: 18px;
            padding: 14px 14px 10px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r-md);
        }
        .ph-head {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .ph-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .ph-range {
            font-size: 11px;
            color: var(--text-3);
        }
        .ph-svg {
            width: 100%;
            display: block;
            font-variant-numeric: tabular-nums;
        }
        .ph-line-sale {
            fill: none;
            stroke: var(--accent);
            stroke-width: 1.6;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .ph-line-orig {
            fill: none;
            stroke: var(--text-3);
            stroke-width: 1.2;
            stroke-dasharray: 3 3;
            opacity: 0.7;
        }
        .ph-area { fill: var(--accent); opacity: 0.06; }
        .ph-grid { stroke: var(--border); stroke-width: 1; opacity: 0.6; }
        .ph-axis-text { font-size: 10px; fill: var(--text-3); }
        .ph-dot {
            fill: var(--accent);
            stroke: var(--surface);
            stroke-width: 1.5;
        }
        .ph-tooltip {
            position: absolute;
            background: rgba(28,25,22,0.92);
            color: #fff;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 11.5px;
            line-height: 1.5;
            pointer-events: none;
            white-space: nowrap;
            transform: translate(-50%, -120%);
            opacity: 0;
            transition: opacity 0.1s;
            font-variant-numeric: tabular-nums;
        }
        .ph-legend {
            display: flex;
            gap: 14px;
            margin-top: 6px;
            font-size: 10.5px;
            color: var(--text-3);
        }
        .ph-legend i { display: inline-block; width: 12px; height: 2px; vertical-align: middle; margin-right: 4px; }
        .ph-legend .sale i { background: var(--accent); }
        .ph-legend .orig i { background: var(--text-3); height: 0; border-top: 2px dashed var(--text-3); }
        .ph-empty {
            font-size: 12px;
            color: var(--text-3);
            text-align: center;
            padding: 28px 0;
        }
    </style>
</head>
<body>

<header class="site-header">
    <div class="header-inner">
        <div class="brand">
            <a href="index.html" class="brand-mark">ARC'TERYX</a>
            <span class="brand-sub">Outlet Deals Tracker</span>
        </div>
        <a href="index.html" class="back" id="back-link">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            返回列表
        </a>
    </div>
</header>

<main id="main">
    <div class="state" id="initial-state">
        <h2>加载中…</h2>
    </div>
</main>

<div class="lightbox" id="lightbox" onclick="this.classList.remove('open')">
    <img id="lightbox-img" alt="">
</div>

<script src="data.js"></script>
<script>
'use strict';

// ── Supabase config ──────────────────────────────────────────────────────────
const SUPABASE_URL  = 'https://bupqagkrcvrezjkdbald.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ1cHFhZ2tyY3ZyZXpqa2RiYWxkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NDU1NTMsImV4cCI6MjA5MjAyMTU1M30.oszdUJIEKMCvpD9XFzTYTCYXj078uwjzFx84tfStfRU';

const RATES = {
    USD: 7.25, EUR: 7.85, GBP: 9.15, CAD: 5.30,
    AUD: 4.70, CHF: 8.20, SEK: 0.70, DKK: 1.05, NOK: 0.68, JPY: 0.048,
};
const SYMBOL_TO_CCY = {
    '$': 'USD', '€': 'EUR', '£': 'GBP', 'C$': 'CAD',
    'A$': 'AUD', 'CHF': 'CHF', 'kr': 'SEK', '¥': 'JPY',
};
const REGION_FLAG = {
    us:'🇺🇸', ca:'🇨🇦', gb:'🇬🇧', de:'🇩🇪', fr:'🇫🇷', nl:'🇳🇱',
    au:'🇦🇺', se:'🇸🇪', at:'🇦🇹', ch:'🇨🇭', jp:'🇯🇵', it:'🇮🇹', es:'🇪🇸', dk:'🇩🇰', be:'🇧🇪',
};
const REGION_LABEL = {
    us:'美国', ca:'加拿大', gb:'英国', de:'德国', fr:'法国', nl:'荷兰',
    au:'澳大利亚', se:'瑞典', at:'奥地利', ch:'瑞士', jp:'日本', it:'意大利', es:'西班牙', dk:'丹麦', be:'比利时',
};
const GENDER_LABEL = { men: '男装', women: '女装', unknown: '中性' };

const PLATFORM = {
    arcteryx_outlet: { label: "Arc'teryx Outlet", color: '#000' },
    ssense:          { label: 'SSENSE',           color: '#000' },
    mec:             { label: 'MEC',              color: '#c8102e' },
    evo:             { label: 'EVO',              color: '#1a1a1a' },
    rei:             { label: 'REI',              color: '#067a46' },
    backcountry:     { label: 'Backcountry',      color: '#003a70' },
    steepandcheap:   { label: 'Steep&Cheap',      color: '#d22730' },
};
function inferPlatform(p) {
    if (p.dealer && PLATFORM[p.dealer]) return PLATFORM[p.dealer];
    const u = (p.url || '').toLowerCase();
    if (u.includes('outlet.arcteryx.com')) return PLATFORM.arcteryx_outlet;
    for (const k of Object.keys(PLATFORM)) {
        if (u.includes(k.replace('_outlet','').replace('_',''))) return PLATFORM[k];
    }
    return PLATFORM.arcteryx_outlet;
}

const toCNY = (price, symbol, currency) => {
    const ccy = currency || SYMBOL_TO_CCY[symbol] || 'USD';
    return Math.round(price * (RATES[ccy] || 7.25));
};
const fmt = (n) => n.toLocaleString('en-US');
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

// Clean up "Name/Name" duplicates in color strings → "Name"
const cleanColor = (raw) => {
    if (!raw) return '';
    const parts = raw.split('/');
    if (parts.length === 2 && parts[0].trim() === parts[1].trim()) return parts[0].trim();
    return raw;
};

const GENDER_MARKERS = ["Women's", "Men's", "Unisex", 'Damen', 'Herren', 'Femme', 'Homme'];
const NAME_PREFIX_STRIP = /^(?:Der|Die|Das|Veste à capuche|Veste|system_a)\s*/i;
const cleanName = (raw) => {
    if (!raw) return '';
    let s = raw.trim().replace(NAME_PREFIX_STRIP, '');
    s = s.replace(/^veilance([A-Z])/, 'Veilance $1');
    for (const m of GENDER_MARKERS) {
        const i = s.indexOf(m);
        if (i > 0) return s.slice(0, i + m.length).trim();
    }
    const m = s.match(/^(.+?[a-z])([A-Z].{12,})$/);
    return m ? m[1].trim() : s;
};

// Extract description that was glued onto the name
const extractGluedDesc = (raw) => {
    if (!raw) return '';
    let s = raw.trim().replace(NAME_PREFIX_STRIP, '').replace(/^veilance([A-Z])/, 'Veilance $1');
    for (const m of GENDER_MARKERS) {
        const i = s.indexOf(m);
        if (i > 0) return s.slice(i + m.length).trim();
    }
    const m = s.match(/^(.+?[a-z])([A-Z].{12,})$/);
    return m ? m[2].trim() : '';
};

// Resolve usable description: prefer glued tail; fall back to description
// only when it's not just duplicating the raw name
const resolveDesc = (p) => {
    const raw = p.full_name || p.model || '';
    const glued = extractGluedDesc(raw);
    if (glued) return glued;
    const d = (p.description || '').trim();
    if (!d) return '';
    if (d === raw || d === p.model) return '';
    return d;
};

const getParam = (k) => new URLSearchParams(location.search).get(k);

// ── Normalize ISO timestamp → "YYYY-MM-DD HH:MM:SS" ──
const normTs = (ts) => ts ? ts.replace('T', ' ').slice(0, 19) : '';

const isBlockedProduct = (p) => {
    const dealer = p.dealer || '';
    const url = String(p.url || '').split('?')[0].replace(/\/$/, '').toLowerCase();
    return (!dealer || dealer === 'arcteryx_outlet') &&
        /outlet\.arcteryx\.com\/(?:[a-z]{2}\/[a-z]{2}\/)?shop\/womens\/rush-bib-pant$/.test(url);
};

// ── Load product from Supabase ─────────────────────────────────────────────
async function loadProduct() {
    const skuId = getParam('sku');
    const url   = getParam('url');
    const slugOf = (u) => (u || '').replace(/\/$/, '').split('/').pop();

    let skuMatches = [];

    try {
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
        let data = null;

        if (skuId) {
            // Find the product's URL via sku_id, then load all colors for that URL
            const { data: target } = await db.from('products')
                .select('url').eq('sku_id', skuId).single();
            if (target?.url) {
                const { data: rows } = await db.from('products')
                    .select('*').eq('url', target.url);
                data = rows;
            }
        } else if (url) {
            // Exact URL match
            const { data: rows } = await db.from('products')
                .select('*').eq('url', url);
            data = rows;
            // Slug fallback
            if (!data?.length) {
                const slug = slugOf(url);
                const { data: allRows } = await db.from('products').select('*');
                data = (allRows || []).filter(s => slugOf(s.url) === slug);
            }
        }

        skuMatches = (data || []).filter(p => !isBlockedProduct(p)).map(p => ({
            ...p,
            last_updated: normTs(p.last_updated),
            sizes:      Array.isArray(p.sizes)           ? p.sizes      : (p.sizes      ? JSON.parse(p.sizes)      : []),
            size_stock: typeof p.size_stock === 'object' ? p.size_stock : (p.size_stock ? JSON.parse(p.size_stock) : {}),
            images:     Array.isArray(p.images)          ? p.images     : (p.images     ? JSON.parse(p.images)     : []),
        }));
    } catch (e) {
        console.warn('Supabase load failed:', e);
    }

    if (skuMatches.length) {
        const current   = skuId ? skuMatches.find(s => s.sku_id === skuId) || skuMatches[0] : skuMatches[0];
        const outletUrl = (url && url !== current.url) ? url : current.url;
        renderSKU(current, skuMatches, outletUrl);
        return;
    }

    renderNotFound();
}

function priceBlock(p) {
    const cny = toCNY(p.sale_price, p.symbol);

    return `

        <span class="price-sale">${esc(p.symbol)}${fmt(p.sale_price)}</span>
        ${p.original_price && p.original_price > p.sale_price ? `<span class="price-orig">${esc(p.symbol)}${fmt(p.original_price)}</span>` : ''}
        <span class="price-cny">≈ ¥${fmt(cny)}</span>
        ${p.discount_pct ? `<span class="save">立省 ${esc(p.symbol)}${fmt(save)} · −${p.discount_pct}%</span>` : ''}
    </div>`;
}

// Extract release season from Arc'teryx image-URL filename like "F25-X000009862-Incendia-Jacket…"
// F/W = Fall/Winter, S = Spring + 2-digit year. Returns string like "2025 秋冬" or null.
const SEASON_LABEL = { F: '秋冬', W: '秋冬', S: '春夏' };
function releaseSeason(p) {
    const urls = [p.image_url, ...(Array.isArray(p.images) ? p.images : [])].filter(Boolean);
    for (const u of urls) {
        // 命中 /F25-..., /S22/..., F25_X000... 等多种分隔; 季度码必须紧跟 /
        // (?=\d 排除像 "Front-View" 这种误匹配)
        const m = u.match(/\/([FSWfsw])(\d{2})(?=[-_/])/);
        if (m) return `20${m[2]} ${SEASON_LABEL[m[1].toUpperCase()] || ''}`.trim();
    }
    return null;
}

function metaBlock(p, extra = {}) {
    const platform = inferPlatform(p);

        ['地区', `${REGION_FLAG[p.region] || ''} ${REGION_LABEL[p.region] || p.region || '—'}`],
        ['品类', p.category || '—'],
        ['性别', GENDER_LABEL[p.gender] || '—'],
        ['货币', p.currency || '—'],
    ];
    const season = releaseSeason(p);
    if (season) items.push(['发售', season]);
    if (extra.sku) items.push(['SKU', extra.sku]);
    if (p.last_updated) items.push(['更新时间', p.last_updated]);  // full YYYY-MM-DD HH:MM:SS
    return `
    <div class="meta">
        ${items.map(([k, v]) => `<div class="meta-item"><span class="meta-label">${k}</span><span class="meta-val">${esc(v)}</span></div>`).join('')}
    </div>`;
}

        <div class="ph-head">
            <span class="ph-title">📈 历史价格</span>

async function loadPriceHistory(skuId, currentRow) {
    const card = document.getElementById(`ph-${skuId}`);
    if (!card || !skuId) return;
    const body = card.querySelector('.ph-body');
    try {
        const since = new Date(Date.now() - 90 * 86400000).toISOString();
        const url = `${SUPABASE_URL}/rest/v1/price_history?select=sale_price,original_price,recorded_at&sku_id=eq.${encodeURIComponent(skuId)}&recorded_at=gte.${since}&order=recorded_at.asc`;
        const r = await fetch(url, {
            headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` }
        });
        const rows = (await r.json()) || [];
        // 补充当前价当 "今天" 节点（即使 history 没记录到今天）
        if (currentRow && currentRow.sale_price) {
            rows.push({
                sale_price: currentRow.sale_price,
                original_price: currentRow.original_price,
                recorded_at: currentRow.last_updated || new Date().toISOString(),
            });
        }
        body.innerHTML = renderPriceHistorySvg(rows, currentRow);
    } catch (e) {
        console.warn('price_history load failed:', e);
        body.innerHTML = `<div class="ph-empty">暂无历史数据</div>`;
    }
}

function renderPriceHistorySvg(rows, currentRow) {
    // 至少 2 个点才画图
    if (!rows || rows.length < 2) {
        return `<div class="ph-empty">暂无足够的价格历史记录</div>`;
    }
    // 排序 + 去重 (同一天保留最后一条)
    const byDay = {};
    rows.forEach(r => {
        const day = (r.recorded_at || '').slice(0, 10);
        if (!day) return;
        byDay[day] = r;
    });
    const points = Object.keys(byDay).sort().map(d => ({
        day: d,
        sale: +byDay[d].sale_price || 0,
        orig: +byDay[d].original_price || 0,
    }));
    if (points.length < 2) return `<div class="ph-empty">暂无足够的价格历史记录</div>`;

    const W = 600, H = 160;
    const PAD_L = 40, PAD_R = 12, PAD_T = 10, PAD_B = 24;
    const innerW = W - PAD_L - PAD_R;
    const innerH = H - PAD_T - PAD_B;
    const allPrices = points.flatMap(p => [p.sale, p.orig].filter(x => x > 0));
    const minP = Math.min(...allPrices);
    const maxP = Math.max(...allPrices);
    const range = Math.max(maxP - minP, 1);
    // 留 10% margin
    const yMin = Math.max(0, minP - range * 0.1);
    const yMax = maxP + range * 0.1;
    const yRange = yMax - yMin;

    const xOf = i => PAD_L + (points.length === 1 ? innerW / 2 : (i / (points.length - 1)) * innerW);
    const yOf = v => PAD_T + innerH - ((v - yMin) / yRange) * innerH;

    const salePath = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${xOf(i).toFixed(1)} ${yOf(p.sale).toFixed(1)}`).join(' ');
    const origPath = points.filter(p => p.orig > 0).map((p, i, arr) => {
        const realIdx = points.indexOf(p);
        return `${i === 0 ? 'M' : 'L'} ${xOf(realIdx).toFixed(1)} ${yOf(p.orig).toFixed(1)}`;
    }).join(' ');
    const areaPath = salePath + ` L ${xOf(points.length - 1).toFixed(1)} ${PAD_T + innerH} L ${xOf(0).toFixed(1)} ${PAD_T + innerH} Z`;

    // 网格 + Y 轴标签 (3 条)
    const yTicks = [yMin, (yMin + yMax) / 2, yMax];
    const gridLines = yTicks.map(y => {
        const yy = yOf(y).toFixed(1);
        return `<line class="ph-grid" x1="${PAD_L}" y1="${yy}" x2="${W - PAD_R}" y2="${yy}"/>
                <text class="ph-axis-text" x="${PAD_L - 4}" y="${yy}" text-anchor="end" dominant-baseline="middle">${Math.round(y)}</text>`;
    }).join('');

    // X 轴标签: 起 / 中 / 终
    const dayLabel = idx => {
        const d = points[idx].day;
        return d.slice(5);  // MM-DD
    };
    const xTicks = [0, Math.floor(points.length / 2), points.length - 1];
    const xLabels = xTicks.map(i => {
        const x = xOf(i).toFixed(1);
        return `<text class="ph-axis-text" x="${x}" y="${H - 6}" text-anchor="middle">${dayLabel(i)}</text>`;
    }).join('');

    // 数据点(只渲染当前的 last 一个)
    const lastI = points.length - 1;
    const lastDot = `<circle class="ph-dot" cx="${xOf(lastI).toFixed(1)}" cy="${yOf(points[lastI].sale).toFixed(1)}" r="3.5"/>`;

    return `<svg class="ph-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
        ${gridLines}
        <path class="ph-area" d="${areaPath}"/>
        ${origPath ? `<path class="ph-line-orig" d="${origPath}"/>` : ''}
        <path class="ph-line-sale" d="${salePath}"/>
        ${lastDot}
        ${xLabels}
    </svg>
    <div class="ph-legend">
        <span class="sale"><i></i>实际售价</span>
        ${points.some(p => p.orig > 0) ? '<span class="orig"><i></i>吊牌原价</span>' : ''}
        <span style="margin-left:auto;color:var(--text-3)">共 ${points.length} 个数据点</span>
    </div>`;
}

                    ${colors.map(c => `<button class="opt ${c.active ? 'active' : ''}" onclick="selectColor('${esc(c.sku_id)}')">${esc(cleanColor(c.name))}</button>`).join('')}

}

        (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16)

async function submitAlert() {
    const btn = document.querySelector('.alert-btn');
    const d = btn.dataset;
    const email = (document.getElementById('pa-email').value || '').trim().toLowerCase();
    const targetRaw = (document.getElementById('pa-target').value || '').trim();
    const target = targetRaw ? parseFloat(targetRaw) : null;
    const msgEl = document.getElementById('pa-msg');
    msgEl.className = 'pa-msg';
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        msgEl.className = 'pa-msg err';
        msgEl.textContent = '邮箱格式不正确';
        return;
    }
    const sale = parseFloat(d.sale) || 0;
    if (target !== null && (isNaN(target) || target <= 0 || target >= sale)) {
        msgEl.className = 'pa-msg err';
        msgEl.textContent = `目标价必须低于当前价 ${d.symbol}${sale}`;
        return;
    }
    const submitBtn = document.getElementById('pa-submit');
    submitBtn.disabled = true;
    submitBtn.textContent = '提交中…';
    try {
        const r = await fetch(`${SUPABASE_URL_PUBLIC}/rest/v1/price_alerts`, {
            method: 'POST',
            headers: {
                'apikey': SUPABASE_ANON_PUBLIC,
                'Authorization': `Bearer ${SUPABASE_ANON_PUBLIC}`,
                'Content-Type': 'application/json',
                'Prefer': 'return=minimal',
            },
            body: JSON.stringify({
                email,
                sku_id: d.sku,
                target_price: target,
                last_price_seen: sale,
                currency: d.currency,
                region: d.region,
                product_name: d.name,
                product_url: d.url,
                image_url: d.image,
                unsubscribe_token: uuid4(),
            }),
        });
        if (!r.ok) {
            const txt = await r.text();
            throw new Error(`HTTP ${r.status}: ${txt.slice(0, 120)}`);
        }
        msgEl.className = 'pa-msg ok';
        msgEl.textContent = `✓ 已订阅. 价格降到 ${d.symbol}${target ?? sale} 时会邮件通知你`;
        setTimeout(closeAlertModal, 2000);
    } catch (e) {
        msgEl.className = 'pa-msg err';
        msgEl.textContent = `订阅失败: ${e.message || e}`;
        console.error(e);
    } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '订阅降价提醒';
    }
}
</script>

<!-- 降价提醒 modal -->
<div class="pa-overlay" id="pa-overlay" hidden>
    <div class="pa-card" role="dialog" aria-labelledby="pa-title">
        <button class="pa-close" onclick="closeAlertModal()" aria-label="关闭">×</button>
        <div class="pa-title" id="pa-title">🔔 降价提醒</div>
        <div class="pa-sub" id="pa-sub-info">—</div>
        <div class="pa-sub" id="pa-product" style="font-weight:500;color:var(--text);margin-top:-8px"></div>
        <div class="pa-field">
            <label>邮箱</label>
            <input type="email" id="pa-email" placeholder="you@example.com" autocomplete="email" inputmode="email">
        </div>
        <div class="pa-field">
            <label>目标价（<span id="pa-symbol">$</span>）</label>
            <input type="number" id="pa-target" placeholder="留空 = 任何下跌都通知" step="0.01" min="0">
            <div class="pa-hint">价格 ≤ 此值时发邮件给你，发完自动取消订阅</div>
        </div>
        <button class="pa-submit" id="pa-submit" onclick="submitAlert()">订阅降价提醒</button>
        <div class="pa-msg" id="pa-msg"></div>
    </div>
</div>

<script>
// ESC + 点空白关闭
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
        const o = document.getElementById('pa-overlay');
        if (o && !o.hidden) closeAlertModal();
    }
});
document.getElementById('pa-overlay')?.addEventListener('click', e => {
    if (e.target.id === 'pa-overlay') closeAlertModal();
});
</script>
